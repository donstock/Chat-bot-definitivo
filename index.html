<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muñeco AI Chat</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    margin:0;
}

#chat{
    height:85vh;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:15px;
}

.user{
    text-align:right;
}

.bot{
    text-align:left;
    color:#7CFFB2;
}

#inputArea{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
}

input{
    width:80%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px;
    font-size:16px;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="textInput" placeholder="Escribe tu mensaje..." />
<button onclick="sendMessage()">Enviar</button>
</div>

<script>

const SERVER_URL = "http://77.48.24.240:8000/chat"; 
// cambia la ruta si tu endpoint es distinto

function addMessage(text, type){

    const chat = document.getElementById("chat")

    const msg = document.createElement("div")
    msg.className = "message " + type
    msg.innerText = text

    chat.appendChild(msg)

    chat.scrollTop = chat.scrollHeight
}

async function sendMessage(){

    const input = document.getElementById("textInput")

    const text = input.value

    if(!text) return

    addMessage(text,"user")

    input.value=""

    try{

        const response = await fetch(SERVER_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        })

        const data = await response.json()

        addMessage(data.response,"bot")

    }catch(e){

        addMessage("Error conectando con el servidor","bot")

    }

}

document.getElementById("textInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter") sendMessage()

})

</script>

</body>
</html>
