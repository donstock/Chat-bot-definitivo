<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Muñeco AI</title><style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:80%;
}

.user{
background:#2979ff;
align-self:flex-end;
}

.bot{
background:#333;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#000;
}

input{
flex:1;
padding:10px;
font-size:16px;
border:none;
border-radius:5px;
}

button{
margin-left:5px;
padding:10px;
font-size:16px;
border:none;
border-radius:5px;
background:#2979ff;
color:white;
}

#mic{
background:#ff5252;
}

</style></head><body><div id="chat"></div><div id="inputArea">
<input id="textInput" placeholder="Escribe algo..." />
<button onclick="sendText()">Enviar</button>
<button id="mic" onclick="record()">🎤</button>
</div><script>

const SERVER="http://77.48.24.240:8000"

const chat=document.getElementById("chat")

function addMessage(text,type){

let div=document.createElement("div")

div.className="message "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function sendText(){

let input=document.getElementById("textInput")

let text=input.value

if(!text)return

addMessage(text,"user")

input.value=""

try{

let r=await fetch(SERVER+"/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

let data=await r.json()

addMessage(data.response,"bot")

playVoice()

}catch(e){

addMessage("Error conectando con el servidor","bot")

}

}

async function playVoice(){

let audio=new Audio(SERVER+"/audio/respuesta.wav")

audio.play()

}

document.getElementById("textInput")
.addEventListener("keypress",e=>{
if(e.key==="Enter")sendText()
})

/* grabación */

let recorder
let chunks=[]

async function record(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=sendAudio

setTimeout(()=>recorder.stop(),5000)

}

async function sendAudio(){

let blob=new Blob(chunks,{type:"audio/wav"})

let form=new FormData()

form.append("file",blob,"audio.wav")

let r=await fetch(SERVER+"/audio",{method:"POST",body:form})

let data=await r.json()

addMessage(data.text,"user")

addMessage(data.response,"bot")

playVoice()

}

</script></body>
</html>
